<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; height: 100vh; display: flex; }

    /* SOL PANEL */
    .sidebar {
      width: 300px; min-width: 300px; background: #1a1a1a; border-right: 1px solid #2a2a2a;
      display: flex; flex-direction: column; padding: 20px; gap: 20px;
    }
    .sidebar h2 { color: #fff; font-size: 18px; }
    .sidebar h3 { color: #aaa; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }

    .upload-area {
      border: 2px dashed #333; border-radius: 10px; padding: 20px; text-align: center;
      cursor: pointer; transition: border-color 0.2s;
    }
    .upload-area:hover { border-color: #6366f1; }
    .upload-area input { display: none; }
    .upload-area p { color: #666; font-size: 13px; margin-top: 8px; }
    .upload-area .icon { font-size: 28px; }

    select, input[type=text] {
      width: 100%; padding: 8px 12px; background: #222; border: 1px solid #333;
      border-radius: 8px; color: #e0e0e0; font-size: 13px; outline: none;
    }
    select:focus, input[type=text]:focus { border-color: #6366f1; }

    .btn {
      width: 100%; padding: 10px; background: #6366f1; color: #fff; border: none;
      border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; transition: background 0.2s;
    }
    .btn:hover { background: #5254cc; }
    .btn:disabled { background: #333; color: #666; cursor: not-allowed; }
    .btn-danger { background: #dc2626; }
    .btn-danger:hover { background: #b91c1c; }

    .doc-list { display: flex; flex-direction: column; gap: 6px; max-height: 200px; overflow-y: auto; }
    .doc-item {
      display: flex; justify-content: space-between; align-items: center;
      background: #222; padding: 8px 12px; border-radius: 8px; font-size: 12px;
    }
    .doc-item span { color: #aaa; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 180px; }
    .doc-item button { background: none; border: none; color: #dc2626; cursor: pointer; font-size: 16px; }

    .status-msg { font-size: 12px; padding: 8px; border-radius: 6px; text-align: center; }
    .status-ok { background: #064e3b; color: #6ee7b7; }
    .status-err { background: #7f1d1d; color: #fca5a5; }

    /* SAĞ PANEL — CHAT */
    .chat-area { flex: 1; display: flex; flex-direction: column; }

    .chat-header {
      padding: 16px 24px; background: #1a1a1a; border-bottom: 1px solid #2a2a2a;
      display: flex; align-items: center; gap: 12px;
    }
    .chat-header .dot { width: 10px; height: 10px; background: #22c55e; border-radius: 50%; }
    .chat-header h1 { font-size: 18px; color: #fff; }
    .chat-header span { font-size: 12px; color: #666; }

    .messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }

    .msg { display: flex; gap: 12px; max-width: 80%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.ai { align-self: flex-start; }

    .avatar {
      width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center;
      justify-content: center; font-size: 16px; flex-shrink: 0;
    }
    .msg.user .avatar { background: #6366f1; }
    .msg.ai .avatar { background: #1e293b; }

    .bubble {
      padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.6; white-space: pre-wrap;
    }
    .msg.user .bubble { background: #6366f1; color: #fff; border-bottom-right-radius: 4px; }
    .msg.ai .bubble { background: #1e293b; color: #e0e0e0; border-bottom-left-radius: 4px; }

    .sources { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 4px; }
    .source-tag {
      font-size: 11px; padding: 2px 8px; background: #0f172a; color: #6366f1;
      border: 1px solid #334155; border-radius: 20px;
    }

    .typing { display: flex; gap: 4px; align-items: center; padding: 12px 16px; background: #1e293b; border-radius: 16px; }
    .typing span { width: 8px; height: 8px; background: #6366f1; border-radius: 50%; animation: bounce 1.2s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-8px); } }

    .input-area {
      padding: 16px 24px; background: #1a1a1a; border-top: 1px solid #2a2a2a;
      display: flex; gap: 12px; align-items: flex-end;
    }
    textarea {
      flex: 1; background: #222; border: 1px solid #333; border-radius: 12px;
      color: #e0e0e0; padding: 12px 16px; font-size: 14px; resize: none;
      outline: none; font-family: inherit; max-height: 120px; min-height: 48px;
    }
    textarea:focus { border-color: #6366f1; }
    .send-btn {
      width: 48px; height: 48px; background: #6366f1; border: none; border-radius: 12px;
      color: #fff; font-size: 20px; cursor: pointer; transition: background 0.2s;
    }
    .send-btn:hover { background: #5254cc; }
    .send-btn:disabled { background: #333; cursor: not-allowed; }

    .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #444; }
    .empty-state h2 { font-size: 24px; color: #666; margin-bottom: 8px; }
    .empty-state p { font-size: 14px; }
  </style>
</head>
<body>

<!-- SOL PANEL -->
<div class="sidebar">
  <div>
    <h2>🤖 My AI</h2>
  </div>

  <div>
    <h3>Döküman Yükle</h3>
    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
      <div class="icon">📄</div>
      <p>PDF, Word, TXT, Excel</p>
      <p>Tıkla veya sürükle</p>
      <input type="file" id="fileInput" accept=".pdf,.docx,.txt,.md,.csv,.xlsx" onchange="handleFileSelect(this)">
    </div>
    <div style="margin-top:10px; display:flex; gap:8px; align-items:center;">
      <select id="categorySelect">
        <option value="general">Genel</option>
        <option value="technical">Teknik</option>
        <option value="hr">İK</option>
        <option value="finance">Finans</option>
        <option value="legal">Hukuk</option>
      </select>
    </div>
    <div style="margin-top:8px;">
      <button class="btn" id="uploadBtn" onclick="uploadDocument()" disabled>Yükle</button>
    </div>
    <div id="uploadStatus" style="margin-top:8px;"></div>
  </div>

  <div>
    <h3>Yüklü Dökümanlar</h3>
    <div class="doc-list" id="docList">
      <div style="color:#555; font-size:12px; text-align:center;">Yükleniyor...</div>
    </div>
    <button class="btn" style="margin-top:8px; background:#222; color:#aaa;" onclick="loadDocuments()">↻ Yenile</button>
  </div>

  <div style="margin-top:auto;">
    <button class="btn btn-danger" onclick="clearChat()">🗑 Sohbeti Temizle</button>
  </div>
</div>

<!-- SAĞ PANEL -->
<div class="chat-area">
  <div class="chat-header">
    <div class="dot"></div>
    <h1>My AI Asistan</h1>
    <span id="modelInfo">qwen2.5:7b</span>
  </div>

  <div class="messages" id="messages">
    <div class="empty-state">
      <h2>Merhaba 👋</h2>
      <p>Bir şeyler sor veya döküman yükleyerek başla.</p>
    </div>
  </div>

  <div class="input-area">
    <textarea id="msgInput" placeholder="Mesajınızı yazın... (Enter ile gönder)" rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
  const API = '';
  let sessionId = 'session_' + Date.now();
  let selectedFile = null;

  // --- CHAT ---
  async function sendMessage() {
    const input = document.getElementById('msgInput');
    const msg = input.value.trim();
    if (!msg) return;

    input.value = '';
    input.style.height = '48px';
    document.getElementById('sendBtn').disabled = true;

    appendMessage('user', msg);
    const typing = appendTyping();

    try {
      const res = await fetch(`${API}/chat/`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg, session_id: sessionId })
      });
      const data = await res.json();
      typing.remove();
      appendMessage('ai', data.response || data.detail, data.sources);
    } catch (e) {
      typing.remove();
      appendMessage('ai', '❌ Bağlantı hatası: ' + e.message);
    }

    document.getElementById('sendBtn').disabled = false;
    input.focus();
  }

  function appendMessage(role, text, sources) {
    const msgs = document.getElementById('messages');
    const empty = msgs.querySelector('.empty-state');
    if (empty) empty.remove();

    const div = document.createElement('div');
    div.className = `msg ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? '👤' : '🤖';

    const right = document.createElement('div');
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    right.appendChild(bubble);

    if (sources && sources.length > 0) {
      const src = document.createElement('div');
      src.className = 'sources';
      sources.forEach(s => {
        const tag = document.createElement('span');
        tag.className = 'source-tag';
        tag.textContent = s.replace('[', '').replace(']', '');
        src.appendChild(tag);
      });
      right.appendChild(src);
    }

    div.appendChild(avatar);
    div.appendChild(right);
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function appendTyping() {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg ai';
    div.innerHTML = `<div class="avatar">🤖</div><div class="typing"><span></span><span></span><span></span></div>`;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return div;
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function autoResize(el) {
    el.style.height = '48px';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function clearChat() {
    sessionId = 'session_' + Date.now();
    document.getElementById('messages').innerHTML = `
      <div class="empty-state"><h2>Merhaba 👋</h2><p>Bir şeyler sor veya döküman yükleyerek başla.</p></div>`;
  }

  // --- DÖKÜMAN ---
  function handleFileSelect(input) {
    selectedFile = input.files[0];
    if (selectedFile) {
      document.getElementById('uploadBtn').disabled = false;
      document.getElementById('uploadStatus').innerHTML =
        `<div class="status-msg" style="background:#1e3a5f;color:#93c5fd;">📎 ${selectedFile.name}</div>`;
    }
  }

  async function uploadDocument() {
    if (!selectedFile) return;
    const btn = document.getElementById('uploadBtn');
    btn.disabled = true;
    btn.textContent = 'Yükleniyor...';

    const formData = new FormData();
    formData.append('file', selectedFile);
    formData.append('category', document.getElementById('categorySelect').value);

    try {
      const res = await fetch(`${API}/documents/upload`, {
        method: 'POST',
        headers: { 'Authorization': 'Bearer Fingon080808Ancalime' },
        body: formData
      });
      const data = await res.json();
      document.getElementById('uploadStatus').innerHTML =
        `<div class="status-msg status-ok">✅ ${data.filename} yüklendi</div>`;
      selectedFile = null;
      document.getElementById('fileInput').value = '';
      loadDocuments();
    } catch (e) {
      document.getElementById('uploadStatus').innerHTML =
        `<div class="status-msg status-err">❌ Hata: ${e.message}</div>`;
    }

    btn.textContent = 'Yükle';
  }

  async function loadDocuments() {
    try {
      const res = await fetch(`${API}/documents/`);
      const data = await res.json();
      const list = document.getElementById('docList');

      if (!data.documents || data.documents.length === 0) {
        list.innerHTML = '<div style="color:#555;font-size:12px;text-align:center;">Henüz döküman yok</div>';
        return;
      }

      list.innerHTML = data.documents.map(d => `
        <div class="doc-item">
          <span title="${d.source}">📄 ${d.source}</span>
          <button onclick="deleteDocument('${d.id}')" title="Sil">✕</button>
        </div>`).join('');
    } catch (e) {
      document.getElementById('docList').innerHTML =
        '<div style="color:#555;font-size:12px;text-align:center;">Yüklenemedi</div>';
    }
  }

  async function deleteDocument(id) {
    if (!confirm('Bu dökümanı silmek istediğine emin misin?')) return;
    try {
      await fetch(`${API}/documents/${id}`, {
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer Fingon080808Ancalime' }
      });
      loadDocuments();
    } catch (e) { alert('Silme hatası: ' + e.message); }
  }

  // Sayfa açılınca dökümanları yükle
  loadDocuments();
</script>
</body>
</html>
