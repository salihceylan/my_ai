services:

  ollama:
    image: ollama/ollama:latest
    container_name: my_ai_ollama
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - ai_net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: my_ai_qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    networks:
      - ai_net

  redis:
    image: redis:7-alpine
    container_name: my_ai_redis
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - ai_net

  postgres:
    image: postgres:16-alpine
    container_name: my_ai_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - ai_net

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: my_ai_api
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env.prod
    depends_on:
      - ollama
      - qdrant
      - redis
      - postgres
    volumes:
      - ./api:/app/api
      - ./pipeline:/app/pipeline
      - ./agent:/app/agent
    restart: unless-stopped
    networks:
      - ai_net

volumes:
  ollama_data:
  qdrant_data:
  redis_data:
  postgres_data:

networks:
  ai_net:
    driver: bridge
