version: "3.9"

services:

  ollama:
    image: ollama/ollama:latest
    container_name: my_ai_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: always

  qdrant:
    image: qdrant/qdrant:latest
    container_name: my_ai_qdrant
    expose:
      - "6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: always

  redis:
    image: redis:7-alpine
    container_name: my_ai_redis
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    restart: always

  postgres:
    image: postgres:16-alpine
    container_name: my_ai_postgres
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  api:
    build:
      context: .
      dockerfile: api/Dockerfile.prod

    container_name: my_ai_api
    expose:
      - "8000"
    env_file:
      - .env.prod
    depends_on:
      - ollama
      - qdrant
      - redis
      - postgres
    restart: always

  nginx:
    image: nginx:alpine
    container_name: my_ai_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - api
    restart: always

  certbot:
    image: certbot/certbot
    container_name: my_ai_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done"
    restart: always

volumes:
  ollama_data:
  qdrant_data:
  redis_data:
  postgres_data:
  certbot_www:
  certbot_conf:
