version: "3.9"

services:

  ollama:
    image: ollama/ollama:latest
    container_name: my_ai_ollama
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - ai_net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: my_ai_qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    networks:
      - ai_net

  redis:
    image: redis:7-alpine
    container_name: my_ai_redis
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - ai_net

  postgres:
    image: postgres:16-alpine
    container_name: my_ai_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - ai_net

  api:
    build: ./api
    container_name: my_ai_api
    env_file:
      - .env.prod
    depends_on:
      - ollama
      - qdrant
      - redis
      - postgres
    volumes:
      - ./api:/app
      - ./pipeline:/pipeline
      - ./agent:/agent
    restart: unless-stopped
    networks:
      - ai_net

  nginx:
    image: nginx:alpine
    container_name: my_ai_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - ai_net

  certbot:
    image: certbot/certbot:latest
    container_name: my_ai_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - ai_net

volumes:
  ollama_data:
  qdrant_data:
  redis_data:
  postgres_data:
  certbot_www:
  certbot_conf:

networks:
  ai_net:
    driver: bridge
