version: "3.9"

services:

  ollama:
    image: ollama/ollama:latest
    container_name: my_ai_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: my_ai_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: my_ai_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: my_ai_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: my_ai_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - ollama
      - qdrant
      - redis
      - postgres
    volumes:
      - ./api:/app/api
      - ./agent:/app/agent
      - ./pipeline:/app/pipeline
    restart: unless-stopped

volumes:
  ollama_data:
  qdrant_data:
  redis_data:
  postgres_data:
